name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      deploy_ref:
        description: "Branch/tag/commit SHA to deploy (use an older SHA for rollback)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      deploy_ref: ${{ steps.vars.outputs.deploy_ref }}
      target_environment: ${{ steps.vars.outputs.target_environment }}
    steps:
      - id: vars
        name: Resolve deploy settings
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "deploy_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "target_environment=staging" >> "$GITHUB_OUTPUT"
          else
            DEPLOY_REF="${{ github.event.inputs.deploy_ref }}"
            if [ -z "$DEPLOY_REF" ]; then
              DEPLOY_REF="main"
            fi
            echo "deploy_ref=$DEPLOY_REF" >> "$GITHUB_OUTPUT"
            echo "target_environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

  verify-frontend:
    name: Verify frontend ref
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  verify-backend:
    name: Verify backend ref
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate composer config
        working-directory: backend
        run: composer validate --no-check-publish

      - name: PHP syntax checks
        working-directory: backend
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [prepare, verify-frontend, verify-backend]
    environment: ${{ needs.prepare.outputs.target_environment }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./frontend/dist
          production-deploy: ${{ needs.prepare.outputs.target_environment == 'production' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ needs.prepare.outputs.deploy_ref }} to ${{ needs.prepare.outputs.target_environment }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: [prepare, verify-frontend, verify-backend]
    environment: ${{ needs.prepare.outputs.target_environment }}
    steps:
      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_REF: ${{ needs.prepare.outputs.deploy_ref }}
          BACKEND_APP_PATH: ${{ secrets.BACKEND_APP_PATH }}
          BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
        with:
          host: ${{ secrets.BACKEND_SSH_HOST }}
          username: ${{ secrets.BACKEND_SSH_USER }}
          key: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          port: ${{ secrets.BACKEND_SSH_PORT || '22' }}
          envs: DEPLOY_REF,BACKEND_APP_PATH,BACKEND_RESTART_COMMAND
          script: |
            set -e
            cd "$BACKEND_APP_PATH"
            git fetch --all --tags --prune
            git checkout "$DEPLOY_REF"
            composer install --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader
            if [ -n "$BACKEND_RESTART_COMMAND" ]; then
              eval "$BACKEND_RESTART_COMMAND"
            fi
